services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      HF_HOME: /app/models/_hf_home
      HF_HUB_DISABLE_XET: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/media:/app/media
      - ./backend/models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/models/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
